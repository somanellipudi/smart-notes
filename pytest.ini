[pytest]
testpaths = tests
python_files = test_*.py
filterwarnings =
    ignore::DeprecationWarning
# Global timeout for tests (seconds). Set to 3600s = 60 minutes to ensure long experiments terminate.
timeout = 3600
timeout_method = thread

# Markers for test categorization
markers =
    paper: Tests required for paper reproducibility (Overleaf bundle, artifacts, leakage scan, retrieval)
    external: Tests requiring network access or external resources (skipped by default)
    slow: Long-running or optional tests

# Default behavior: exclude external tests unless explicitly requested
addopts = -m "not external"
